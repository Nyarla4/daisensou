<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Line Defense Prototype</title>
    <style>
        /* battlefield를 유닛들이 자유롭게 움직일 수 있도록 상대 좌표(relative)로 설정 */
        #field {
            display: flex;
            align-items: flex-end;
            width: 600px;
            height: 150px;
            border: 1px solid #ccc;
            position: relative;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }
        .base {
            width: 50px;
            height: 100px;
            position: absolute;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
        #enemyBase { background-color: red; left: 0; }
        #playerBase { background-color: blue; right: 0; }

        /* 소환될 아군 유닛 스타일 */
        .dummy {
            width: 30px;
            height: 50px;
            background-color: cyan;
            position: absolute;
            bottom: 0;
            border: 1px solid #000;
        }
    </style>
</head>
<body>

    <div id="field">
        <div id="enemyBase" class="base">적 기지</div>
        <!-- 유닛들이 배치될 전장 -->
        <div id="playerBase" class="base">아군 기지</div>
    </div>

    <div class="container">
        <span id="costDisplay">Current Cost: 0</span><br><br>
        <button id="btn" class="btn btn-primary">setDummy (Cost: 20)</button>
    </div>

    <script>
        // 1. 게임 기준 데이터 설정
        let cost = 0;
        const costPerSec = 10; // 초당 충전될 코스트
        const dummyStat = {
            cost: 20,
            moveSpeed: 50, // 초당 이동할 픽셀(px)
            attackDamage: 10,
            attackTerm: 1000 // 공격 주기 (1초 = 1000ms)
        };

        // 적 기지의 위치 및 체력 (충돌 감지용)
        const enemyBaseElement = document.getElementById('enemyBase');
        let enemyBaseHp = 100;

        // 생성된 유닛들을 관리할 배열
        let activeDummies = [];

        // DOM 요소 초기화
        const costDisplay = document.getElementById('costDisplay');
        const btnDummy = document.getElementById('btn');
        const field = document.getElementById('field');

        // 2. 코스트 실시간 충전 (1초에 60번씩 나누어 정밀하게 증가)
        let lastTime = performance.now();
        
        function gameLoop(now) {
            let deltaTime = (now - lastTime) / 1000; // 지난 프레임과의 시간 차이 (초 단위)
            lastTime = now;

            // 코스트 증가
            cost += costPerSec * deltaTime;
            costDisplay.innerText = `Current Cost: ${Math.floor(cost)}`;

            // 유닛 이동 및 전투 로직 처리
            updateUnits(deltaTime);

            requestAnimationFrame(gameLoop);
        }
        requestAnimationFrame(gameLoop);

        // 3. 유닛 소환 버튼 이벤트
        btnDummy.onclick = () => {
            if (cost < dummyStat.cost) {
                alert("코스트가 부족합니다!");
                return;
            }
            cost -= dummyStat.cost;
            instantiateDummy();
        };

        // 4. 유닛 생성 (Instantiate)
        function instantiateDummy() {
            const element = document.createElement('div');
            element.className = 'dummy';
            
            // 아군 기지 앞(오른쪽 끝 쪽)에서 시작하도록 초기 위치 설정
            // 기지 너비가 50px이므로 600 - 50 - 유닛너비(30) = 520px 지점
            let startPos = 520; 
            element.style.left = startPos + 'px';
            field.appendChild(element);

            // 유닛 객체 생성 및 배열에 추가
            const newDummy = {
                element: element,
                x: startPos,
                isAttacking: false,
                lastAttackTime: 0
            };
            activeDummies.push(newDummy);
        }

        // 5. 유닛 행동 업데이트 (이동, 충돌 감지, 공격)
        function updateUnits(deltaTime) {
            // 적 기지의 오른쪽 경계면 x좌표는 50px (너비가 50이므로)
            const enemyBaseRightWall = 50; 

            for (let i = activeDummies.length - 1; i >= 0; i--) {
                let dummy = activeDummies[i];

                // 충돌 감지 (oncollider): 적 기지 벽면에 닿았는지 확인
                if (dummy.x <= enemyBaseRightWall) {
                    // 이동을 멈추고 공격 모드로 전환
                    dummy.x = enemyBaseRightWall; 
                    dummy.element.style.left = dummy.x + 'px';
                    
                    // 공격 처리 (attackTargets)
                    let currentTime = performance.now();
                    if (currentTime - dummy.lastAttackTime >= dummyStat.attackTerm) {
                        attackEnemyBase(dummy);
                        dummy.lastAttackTime = currentTime;
                    }
                } else {
                    // 적이 없으면 왼쪽으로 이동 (moveLeftFromStartPos)
                    dummy.x -= dummyStat.moveSpeed * deltaTime;
                    dummy.element.style.left = dummy.x + 'px';
                }
            }
        }

        // 6. 공격 실행 함수
        function attackEnemyBase(dummy) {
            if (enemyBaseHp <= 0) return;

            enemyBaseHp -= dummyStat.attackDamage;
            enemyBaseElement.innerText = `HP: ${enemyBaseHp}`;
            
            // 유닛이 공격할 때 살짝 깜빡이는 효과
            dummy.element.style.backgroundColor = 'yellow';
            setTimeout(() => { dummy.element.style.backgroundColor = 'cyan'; }, 100);

            if (enemyBaseHp <= 0) {
                enemyBaseElement.style.backgroundColor = '#555';
                enemyBaseElement.innerText = `파괴됨`;
                alert("승리했습니다!");
            }
        }
    </script>
</body>
</html>
