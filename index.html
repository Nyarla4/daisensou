<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <div id="title" class="screen active">
        타이틀
        <button id="stage-btn" class="btn btn-secondary">Stages</button>
        <button id="upgrade-btn" class="btn btn-secondary">Upgrade</button>
        <button id="setting-btn" class="btn btn-secondary">Setting</button>
    </div>
    <div id="stage" class="screen">
        <div id="stageSelector" class="innerScreen active">
            스테이지 선택
        </div>
        <div id="inStage" class="innerScreen">
            <div class="container" id="field">
                <div id="enemyBase">
                    <div id="enemyHp">0/100</div>
                </div>
                <div id="playerBase">
                    <div id="playerHp">100/100</div>
                </div>
            </div>
            <div class="container">
                <span id="cost">Current Cost: 0</span>
                <div id="creature-btn-list">

                </div>
            </div>
        </div>
    </div>
    <div id="upgrade" class="screen">
        업그레이드
        <div id="upgrade-btn-list">

        </div>
    </div>
    <button id="back-btn" class="btn btn-secondary">뒤로</button>
    <div id="settings" class="modal-content" style="display: none;">
        <h2>설정</h2>
        <p>설정 내용</p>
        <button id="close-settings" class="btn btn-secondary">Close</button>
    </div>
</body>
<script src="./js/main.js" type="module"></script>

</html>
